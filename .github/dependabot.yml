version: 2

# Strategy: keep security updates auto-flowing, but suppress noisy
# version-update PRs for major bumps. Major upgrades are reviewed and
# applied manually (they tend to require breaking-change work).
_ignore_major: &ignore_major
  - dependency-name: "*"
    update-types: ["version-update:semver-major"]

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      minor-patch:
        update-types: [minor, patch]
    open-pull-requests-limit: 5
    ignore: *ignore_major

  - package-ecosystem: npm
    directory: /server
    schedule:
      interval: weekly
      day: monday
    groups:
      minor-patch:
        update-types: [minor, patch]
    open-pull-requests-limit: 5
    ignore: *ignore_major

  - package-ecosystem: pip
    directory: /risk-engine
    schedule:
      interval: weekly
      day: monday
    groups:
      minor-patch:
        update-types: [minor, patch]
    open-pull-requests-limit: 5
    ignore: *ignore_major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
    ignore: *ignore_major

  - package-ecosystem: docker
    directory: /server
    schedule:
      interval: weekly
      day: monday
    ignore: *ignore_major

  - package-ecosystem: docker
    directory: /risk-engine
    schedule:
      interval: weekly
      day: monday
    ignore: *ignore_major
