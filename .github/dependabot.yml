version: 2
# Strategy: keep security updates auto-flowing, but suppress noisy
# version-update PRs for major bumps. Major upgrades are reviewed and
# applied manually (they tend to require breaking-change work).
# Note: Dependabot does NOT support YAML anchors / aliases — every
# `ignore:` block must be written out explicitly.
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      minor-patch:
        update-types: [minor, patch]
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: npm
    directory: /server
    schedule:
      interval: weekly
      day: monday
    groups:
      minor-patch:
        update-types: [minor, patch]
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: pip
    directory: /risk-engine
    schedule:
      interval: weekly
      day: monday
    groups:
      minor-patch:
        update-types: [minor, patch]
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: docker
    directory: /server
    schedule:
      interval: weekly
      day: monday
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: docker
    directory: /risk-engine
    schedule:
      interval: weekly
      day: monday
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
