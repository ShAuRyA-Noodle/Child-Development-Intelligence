version: "3.9"

services:
  risk-engine:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MODEL_PATH=${MODEL_PATH:-models/xgb_risk_model.json}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PORT=${PORT:-8000}
    volumes:
      - ./models:/app/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8000/health'); assert r.status_code == 200"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
